# Bot config — per-engine overrides
# These map to engine CLI args

# M30 Imbalance — Medium (adversarial)
m30_imbalance:
  tier: M30
  direction: both
  tag: _medium
  ema_dist: 1.0
  min_turn: 1000000
  stoch_max: 70
  equity: 1000
  risk_pct: 0.01
  max_positions: 6
  leverage: 5
  daily_loss_pct: 0.05
  max_dd_pct: 0.20
  interval_sec: 300
  warm_batch: 40
  cold_batch: 347
  soft_pending_cap: 20
  adversarial: true
  cvd: false
  btc_regime: false
  symbols_file: ../runtime/revo/canonical_universe.txt

